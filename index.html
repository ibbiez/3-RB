<!DOCTYPE html>
<html>
<head>

<title>Convite de Padrinho</title>

}

h1{
    color:#e60000;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>Convite Especial</h1>

<p>Assim como todo treinador precisa de um parceiro forte...</p>

<p>Eu preciso de alguém especial nessa jornada do terceirão.</p>

<h2>Você aceita ser meu padrinho?</h2>

<button onclick="alert('Missão aceita! 🔴⚪')">
Aceitar missão
</button>

</div>

</body>
</html>
